exec-once = $HOME/.scripts/hypr_import_env tmux
exec-once = $HOME/.scripts/hypr_import_env system
exec-once = $HOME/.scripts/hypr_wallpaper daemon $wppDir 
exec-once = $HOME/.scripts/hypr_xdg_portal_hyprland
exec-once = $HOME/.scripts/hypr_handle_monitor handle

exec-once = hypridle

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME
exec-once = brightnessctl --device=tpacpi::kbd_backlight set 50%
exec-once = xdg-user-dirs-update --force
exec-once = hyprctl setcursor Adwaita 24

exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store 

exec-once = blueman-applet
exec-once = fcitx5

exec-once = udiskie --tray

exec-once = flameshot 
exec-once = ags 
